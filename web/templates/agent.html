<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OK — Workspace</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/agent.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
</head>
<body>
  <div class="workspace">

    <header class="workspace-header">
      <div class="header-left">
        <span class="header-logo">OK</span>
        <span class="header-badge">Workspace</span>
        <div class="status-indicator" id="agentState">
          <span class="status-dot idle"></span>
          <span class="status-text">idle</span>
        </div>
      </div>
      <div class="header-right">
        <button class="btn-stop" id="stopBtn" type="button" style="display:none">STOP</button>
        <a href="/chat" class="header-link">Chat</a>
        <a href="/profile" class="header-link">Perfil</a>
      </div>
    </header>

    <div class="workspace-body">

      <!-- PAINEL ESQUERDO: Chat -->
      <section class="panel panel-left" id="panelLeft">
        <div class="panel-header">
          <span class="panel-title">Chat</span>
        </div>
        <div class="panel-content" id="chatPanel"></div>
        <div class="chat-input-area">
          <form class="chat-form" id="agentForm">
            <input class="chat-input" id="agentInput" type="text" placeholder="Comando para o agent..." autocomplete="off">
            <button class="chat-send" id="agentSend" type="submit" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg>
            </button>
          </form>
        </div>
      </section>

      <div class="resizer" id="resizer1"></div>

      <!-- PAINEL CENTRAL: Terminal + Diff -->
      <section class="panel panel-center" id="panelCenter">
        <div class="panel-header">
          <div class="tab-bar">
            <button class="tab active" data-tab="terminal">Terminal</button>
            <button class="tab" data-tab="diff">Diff</button>
          </div>
        </div>
        <div class="panel-content">
          <div class="tab-content active" id="tabTerminal">
            <div id="terminalContainer"></div>
          </div>
          <div class="tab-content" id="tabDiff">
            <div class="diff-empty" id="diffEmpty">Nenhum diff disponivel</div>
            <div class="diff-viewer" id="diffViewer" style="display:none">
              <div class="diff-header" id="diffHeader"></div>
              <div class="diff-content" id="diffContent"></div>
            </div>
          </div>
        </div>
      </section>

      <div class="resizer" id="resizer2"></div>

      <!-- PAINEL DIREITO: Estado -->
      <section class="panel panel-right" id="panelRight">
        <div class="panel-header">
          <span class="panel-title">Estado</span>
        </div>
        <div class="panel-content panel-scroll">

          <div class="sidebar-section">
            <h3 class="section-title">Execucoes</h3>
            <div id="replayList" class="section-empty">Sem historico</div>
          </div>

          <div class="sidebar-section">
            <h3 class="section-title">Jobs</h3>
            <div id="jobsList" class="section-empty">Sem jobs</div>
          </div>

          <div class="sidebar-section">
            <h3 class="section-title">Canais</h3>
            <div id="channelsList"></div>
          </div>

          <div class="sidebar-section">
            <h3 class="section-title">Memoria</h3>
            <div id="memoryList" class="section-empty">Sem memorias</div>
          </div>

        </div>
      </section>

    </div>

    <!-- MODAL HIL -->
    <div class="modal-overlay" id="confirmModal" style="display:none">
      <div class="modal-box">
        <div class="modal-header">
          <span class="modal-icon">&#9888;</span>
          <span class="modal-title">Confirmacao Necessaria</span>
        </div>
        <div class="modal-tool" id="confirmTool"></div>
        <pre class="modal-summary" id="confirmSummary"></pre>
        <div class="modal-timer" id="confirmTimer">30s</div>
        <div class="modal-actions">
          <button class="btn-approve" id="confirmApprove">Aprovar</button>
          <button class="btn-reject" id="confirmReject">Rejeitar</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="/static/js/agent.js"></script>
</body>
</html>
