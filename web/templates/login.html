<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OK — Entrar</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  
  <div class="login-container glass-panel">
    <div class="login-logo">OK Central</div>
    <div class="login-subtitle">Acesso ao Workspace do Agente</div>

    <form class="login-form" id="loginForm">
      <div id="errorBox" class="error-msg"></div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="input-modern" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <button type="submit" class="primary-btn btn-submit" id="btnSubmit">Secure Login</button>
    </form>
  </div>

  <script src="/static/js/login.js"></script>
</body>
</html>
